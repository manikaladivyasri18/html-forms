<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration form</title>
</head>
<body>
    <h1>Student Registeration form</h1>
    <label for="Name">Name:</label>
    <input type="Text">
    <br>
    <label for="Email">Email:</label>
    <input type="email" required>
    <br>
    <label for="Password">Password:</label>
    <input type="password" minlength="10">
    <br>
    <b>Gender:</b>
    <input type="radio">
    <label for="male ">male</label>
    <input type="radio">
    <label for="female radio">female</label>
    <br>
    <b>Select Course:</b>
    <input type="radio">
    <label for="ECE radio">ECE</label>
    <input type="radio">
    <label for="CSE radio">CSE</label>
    <input type="radio">
    <label for="IT radio">IT</label>
    <input type="radio">
    <label for="AIDS radio">AIDS</label>
    <input type="radio">
    <label for="AIML radio">AIML</label>
    <br>
    <label for="Date of birth">date of birth</label>
    <input type="date">
    <br>
    <button type="Submit">submit</button>
</body>
</html>
